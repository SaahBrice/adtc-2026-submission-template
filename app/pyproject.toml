# Tooling config for the adtc_notes app (dev-time only; no runtime impact).

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]  # black handles line length

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true   # optional backends (llama_cpp, pix2tex, …) are untyped
warn_unused_ignores = false

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-q"
