<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Docaware</title>
<!-- Fully offline: CSS, JS (marked, temml), icons all local. No CDN, no fonts to fetch. -->
<style>
  :root {
    --canvas:#f4f6f9; --surface:#ffffff; --surface-2:#eef1f5; --inset:#f7f8fa;
    --fg:#181c22; --fg-2:#525c6b; --fg-3:#8b95a3; --fg-4:#aab2bf;
    --border:rgba(20,26,38,.10); --border-2:rgba(20,26,38,.17); --ring:rgba(47,111,237,.35);
    --accent:#2f6fed; --accent-ink:#fff; --accent-soft:#eaf1fe;
    --success:#1a7f37; --danger:#cf222e;
    --r-sm:7px; --r-md:10px; --r-lg:14px;
    --shadow:0 1px 2px rgba(16,24,40,.04), 0 1px 3px rgba(16,24,40,.07);
    --ease:cubic-bezier(.23,1,.32,1);
  }
  * { box-sizing:border-box; }
  html,body { height:100%; margin:0; }
  body { background:var(--canvas); color:var(--fg); font:14px/1.55 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; -webkit-font-smoothing:antialiased; display:flex; flex-direction:column; }
  .icon { width:16px; height:16px; stroke:currentColor; stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; flex:0 0 auto; }

  header { display:flex; align-items:center; gap:12px; padding:11px 20px; background:var(--surface); border-bottom:1px solid var(--border); }
  .brand { font-size:15px; font-weight:650; letter-spacing:-.2px; }
  #status { margin-left:auto; display:flex; align-items:center; gap:14px; font-size:12px; color:var(--fg-3); }
  .stat { display:inline-flex; align-items:center; gap:6px; }
  .dot { width:7px; height:7px; border-radius:50%; background:var(--fg-4); transition:background .2s var(--ease); }
  .dot.on { background:var(--success); }

  .tabs { display:flex; gap:2px; padding:8px 20px 0; background:var(--surface); border-bottom:1px solid var(--border); }
  .tabs button { display:inline-flex; align-items:center; gap:7px; background:transparent; color:var(--fg-3); border:0; border-bottom:2px solid transparent; padding:9px 12px 11px; font:inherit; font-weight:550; cursor:pointer; }
  .tabs button:hover { color:var(--fg-2); }
  .tabs button.active { color:var(--accent); border-bottom-color:var(--accent); }

  main { flex:1; min-height:0; display:flex; }
  .hidden { display:none !important; }

  /* Sidebar */
  aside { width:240px; flex:0 0 240px; border-right:1px solid var(--border); background:var(--surface); display:flex; flex-direction:column; min-height:0; }
  .newchat { margin:12px; display:inline-flex; align-items:center; justify-content:center; gap:7px; padding:9px; border-radius:var(--r-sm); background:var(--accent); color:#fff; border:0; font:inherit; font-weight:600; cursor:pointer; }
  .newchat:active { transform:scale(.98); }
  .sessions { flex:1; overflow-y:auto; padding:0 8px 12px; display:flex; flex-direction:column; gap:2px; }
  .sess { display:flex; align-items:center; gap:8px; padding:9px 10px; border-radius:var(--r-sm); cursor:pointer; color:var(--fg-2); }
  .sess:hover { background:var(--surface-2); }
  .sess.active { background:var(--accent-soft); color:var(--fg); }
  .sess .t { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:13px; }
  .sess .del { opacity:0; color:var(--fg-3); } .sess:hover .del { opacity:1; } .sess .del:hover { color:var(--danger); }

  /* Chat panel */
  .panel { flex:1; min-width:0; display:flex; flex-direction:column; }
  .chatwrap { flex:1; min-height:0; display:flex; flex-direction:column; max-width:820px; width:100%; margin:0 auto; padding:16px 20px; gap:12px; }
  .libbar { display:flex; gap:10px; align-items:center; }
  .doclist { display:flex; flex-wrap:wrap; gap:6px; }
  .doclist:empty { display:none; }
  .chip { display:inline-flex; align-items:center; gap:6px; padding:4px 8px 4px 10px; background:var(--surface); border:1px solid var(--border); border-radius:999px; font-size:12px; color:var(--fg-2); }
  .chip .x { display:inline-flex; cursor:pointer; color:var(--fg-3); border-radius:50%; }
  .chip .x:hover { color:var(--danger); }
  .chip.removing { opacity:.5; pointer-events:none; }
  .chip .icon { width:13px; height:13px; }
  .grow { flex:1; min-width:0; }
  input[type=file], select, textarea { background:var(--inset); color:var(--fg); border:1px solid var(--border); border-radius:var(--r-sm); padding:9px 11px; font:inherit; }
  input[type=file]::file-selector-button { background:var(--surface-2); color:var(--fg-2); border:1px solid var(--border); border-radius:6px; padding:5px 10px; margin-right:10px; font:inherit; cursor:pointer; }
  :focus-visible { outline:none; border-color:var(--border-2); box-shadow:0 0 0 3px var(--ring); }
  .btn { display:inline-flex; align-items:center; gap:7px; background:var(--accent); color:#fff; border:0; border-radius:var(--r-sm); padding:9px 14px; min-height:38px; font:inherit; font-weight:600; cursor:pointer; transition:transform .1s var(--ease),filter .15s var(--ease); }
  .btn:hover { filter:brightness(1.05); } .btn:active { transform:scale(.97); } .btn:disabled { opacity:.45; cursor:not-allowed; }
  .btn.ghost { background:var(--surface); color:var(--fg-2); border:1px solid var(--border); }
  .btn.ghost:hover { background:var(--surface-2); filter:none; }

  .transcript { flex:1; min-height:0; overflow-y:auto; display:flex; flex-direction:column; gap:14px; padding:4px; }
  .msg { display:flex; } .msg.user { justify-content:flex-end; }
  .bubble { max-width:82%; padding:11px 14px; border-radius:var(--r-lg); }
  .msg.user .bubble { background:var(--accent); color:#fff; border-bottom-right-radius:4px; }
  .msg.ai .bubble { background:var(--surface); border:1px solid var(--border); box-shadow:var(--shadow); border-bottom-left-radius:4px; }
  .src { margin-top:8px; font-size:11.5px; color:var(--fg-3); }
  .src code { background:var(--surface-2); padding:1px 5px; border-radius:4px; }
  .empty { margin:auto; text-align:center; color:var(--fg-3); font-size:13px; max-width:360px; }
  .composer { display:flex; gap:10px; align-items:flex-end; }
  .composer textarea { flex:1; resize:none; max-height:160px; min-height:42px; }
  .spin { display:inline-flex; gap:8px; align-items:center; color:var(--fg-3); font-size:13px; }
  .spin .icon { animation:rot 1s linear infinite; } @keyframes rot { to { transform:rotate(360deg); } }
  .err { color:var(--danger); font-size:13px; display:inline-flex; gap:6px; align-items:center; }
  .muted { color:var(--fg-3); font-size:13px; }
  a.dl { display:inline-flex; align-items:center; gap:7px; color:var(--accent); text-decoration:none; font-weight:600; } a.dl:hover { text-decoration:underline; }

  /* Rendered markdown */
  .rich :first-child { margin-top:0; } .rich :last-child { margin-bottom:0; }
  .rich h1,.rich h2,.rich h3 { line-height:1.25; margin:14px 0 6px; } .rich h1 { font-size:19px; } .rich h2 { font-size:16px; } .rich h3 { font-size:14px; }
  .rich p { margin:8px 0; } .rich ul,.rich ol { margin:8px 0; padding-left:22px; }
  .rich code { background:var(--surface-2); padding:1px 5px; border-radius:4px; font:12.5px ui-monospace,Consolas,monospace; }
  .rich pre { background:var(--inset); border:1px solid var(--border); border-radius:var(--r-md); padding:12px; overflow:auto; } .rich pre code { background:none; padding:0; }
  .rich table { border-collapse:collapse; width:100%; margin:10px 0; font-size:13px; }
  .rich th,.rich td { border:1px solid var(--border); padding:6px 10px; text-align:left; } .rich th { background:var(--surface-2); font-weight:650; }
  .rich math { font-size:1.05em; } .rich blockquote { margin:8px 0; padding:2px 12px; border-left:3px solid var(--border-2); color:var(--fg-2); }

  .digwrap { max-width:820px; margin:0 auto; width:100%; padding:20px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg); padding:18px; box-shadow:var(--shadow); }
  .row { display:flex; gap:10px; align-items:center; }
  @media (prefers-reduced-motion: reduce){ *{ animation:none!important; transition:none!important; } }
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="i-scan" viewBox="0 0 24 24"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><path d="M7 12h10"/></symbol>
  <symbol id="i-chat" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></symbol>
  <symbol id="i-download" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></symbol>
  <symbol id="i-plus" viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M12 5v14"/></symbol>
  <symbol id="i-send" viewBox="0 0 24 24"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7z"/></symbol>
  <symbol id="i-loader" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></symbol>
  <symbol id="i-trash" viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></symbol>
  <symbol id="i-x" viewBox="0 0 24 24"><path d="M18 6 6 18"/><path d="M6 6l12 12"/></symbol>
  <symbol id="i-error" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4"/><path d="M12 16h.01"/></symbol>
</svg>

<header>
  <span class="brand">Docaware</span>
  <div id="status">
    <span class="stat"><span class="dot" id="dotVis"></span>Vision</span>
    <span class="stat"><span class="dot" id="dotLLM"></span>Model</span>
    <span class="stat"><span class="dot" id="dotEmb"></span>Embeddings</span>
  </div>
</header>

<div class="tabs">
  <button id="tabChat" class="active" onclick="show('chat')"><svg class="icon"><use href="#i-chat"/></svg>Chat</button>
  <button id="tabDig" onclick="show('dig')"><svg class="icon"><use href="#i-scan"/></svg>Digitize</button>
</div>

<main>
  <!-- CHAT -->
  <aside id="sidebar">
    <button class="newchat" onclick="newChat()"><svg class="icon"><use href="#i-plus"/></svg>New chat</button>
    <div class="sessions" id="sessions"></div>
  </aside>
  <div class="panel" id="pane-chat">
    <div class="chatwrap">
      <div class="libbar">
        <input type="file" id="docFiles" class="grow" multiple />
        <button class="btn ghost" id="addBtn" onclick="addDocs()"><svg class="icon"><use href="#i-plus"/></svg>Add documents</button>
      </div>
      <div class="doclist" id="docList"></div>
      <div class="transcript" id="transcript"></div>
      <div class="composer">
        <textarea id="q" rows="1" placeholder="Ask about this chat's documents…"></textarea>
        <button class="btn" id="askBtn" onclick="ask()"><svg class="icon"><use href="#i-send"/></svg></button>
      </div>
    </div>
  </div>

  <!-- DIGITIZE -->
  <div class="panel hidden" id="pane-dig">
    <div class="digwrap">
      <div class="card">
        <div class="row">
          <input type="file" id="digFile" class="grow" accept="image/*" />
          <select id="digFmt"><option value="md">Markdown</option><option value="docx">Word</option><option value="pdf">PDF</option></select>
          <button class="btn" id="digBtn" onclick="digitize()"><svg class="icon"><use href="#i-scan"/></svg>Digitize</button>
        </div>
        <div id="digOut" style="margin-top:14px"></div>
      </div>
    </div>
  </div>
</main>

<script src="/static/vendor/marked.min.js"></script>
<script src="/static/vendor/temml.min.js"></script>
<script>
const ic=id=>`<svg class="icon"><use href="#${id}"/></svg>`;
const esc=s=>(''+s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
let SID=null;

// Markdown + LaTeX -> HTML (math extracted before marked so TeX isn't mangled; rendered to MathML).
function renderRich(md){
  const math=[]; const stash=(t,d)=>{math.push([t,d]);return `@@M${math.length-1}@@`;};
  let s=(md||'').replace(/\$\$([\s\S]+?)\$\$/g,(_,t)=>stash(t,true)).replace(/\$([^\$\n]+?)\$/g,(_,t)=>stash(t,false));
  return marked.parse(s).replace(/@@M(\d+)@@/g,(_,i)=>{try{return temml.renderToString(math[i][0].trim(),{displayMode:math[i][1]});}catch(e){return esc((math[i][1]?'$$':'$')+math[i][0]+(math[i][1]?'$$':'$'));}});
}
function show(w){
  document.getElementById('sidebar').classList.toggle('hidden',w!=='chat');
  document.getElementById('pane-chat').classList.toggle('hidden',w!=='chat');
  document.getElementById('pane-dig').classList.toggle('hidden',w!=='dig');
  tabChat.classList.toggle('active',w==='chat'); tabDig.classList.toggle('active',w==='dig');
}
async function refreshStatus(){
  try{const s=await (await fetch('/api/status')).json();
    dotVis.classList.toggle('on',s.vision_present); dotLLM.classList.toggle('on',s.llm_present); dotEmb.classList.toggle('on',s.embed_present);
  }catch(e){}
}

// --- sessions ---
async function loadSessions(){
  const list=await (await fetch('/api/sessions')).json();
  const box=document.getElementById('sessions'); box.innerHTML='';
  if(!list.length){ await newChat(); return; }
  for(const s of list){
    const el=document.createElement('div'); el.className='sess'+(s.id===SID?' active':''); el.dataset.id=s.id; el.onclick=()=>selectSession(s.id);
    el.innerHTML=`<span class="t">${esc(s.title)}</span><span class="del" title="Delete" onclick="event.stopPropagation();delChat('${s.id}')">${ic('i-trash')}</span>`;
    box.appendChild(el);
  }
  if(!SID || !list.find(s=>s.id===SID)) selectSession(list[0].id);
}
async function newChat(){
  const s=await (await fetch('/api/sessions',{method:'POST'})).json();
  SID=s.id; await loadSessions(); selectSession(s.id);
}
async function delChat(id){
  await fetch(`/api/sessions/${id}/delete`,{method:'POST'});
  if(id===SID) SID=null; await loadSessions();
}
async function selectSession(id){
  SID=id;
  document.querySelectorAll('.sess').forEach(e=>e.classList.toggle('active', e.dataset.id===id));
  const data=await (await fetch(`/api/sessions/${id}`)).json();
  renderDocs(data.documents||[]);
  const t=document.getElementById('transcript'); t.innerHTML='';
  if(!(data.history||[]).length){
    t.innerHTML=`<div class="empty">Add documents, then ask. This chat keeps the whole conversation in memory and cites the document and page.</div>`;
  } else {
    for(let i=0;i<data.history.length;i++){
      const m=data.history[i];
      addMsg(m.role==='user'?'user':'ai', m.role==='user'?esc(m.content):`<div class="rich">${renderRich(m.content)}</div>`);
    }
  }
}
function renderDocs(docs){
  const box=document.getElementById('docList'); box.innerHTML='';
  for(const name of docs){
    const c=document.createElement('span'); c.className='chip'; c.dataset.name=name;
    c.innerHTML=`<span>${esc(name)}</span><span class="x" title="Remove" onclick="removeDoc(${JSON.stringify(name)})">${ic('i-x')}</span>`;
    box.appendChild(c);
  }
}
async function removeDoc(name){
  if(!SID) return;
  const chip=document.querySelector(`#docList .chip[data-name="${CSS.escape(name)}"]`);
  if(chip) chip.classList.add('removing');
  try{
    const j=await (await fetch(`/api/sessions/${SID}/documents/remove`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name})})).json();
    renderDocs(j.documents||[]);
  }catch(e){ if(chip) chip.classList.remove('removing'); }
}
function addMsg(role,html){
  const t=document.getElementById('transcript'); const e=t.querySelector('.empty'); if(e) e.remove();
  const m=document.createElement('div'); m.className='msg '+role;
  const b=document.createElement('div'); b.className='bubble'; b.innerHTML=html;
  m.appendChild(b); t.appendChild(m); t.scrollTop=t.scrollHeight; return b;
}
async function addDocs(){
  const files=document.getElementById('docFiles').files; if(!files.length||!SID) return;
  const btn=document.getElementById('addBtn'); btn.disabled=true;
  const note=addMsg('ai',`<span class="spin">${ic('i-loader')}Indexing ${files.length} file(s)…</span>`);
  const fd=new FormData(); for(const f of files) fd.append('files',f);
  try{const j=await (await fetch(`/api/sessions/${SID}/documents`,{method:'POST',body:fd})).json();
    if(j.error){ note.innerHTML=`<span class="err">${ic('i-error')}${esc(j.error)}</span>`; }
    else { note.innerHTML=`<span class="muted">Added ${j.added} chunk(s) from ${files.length} file(s). Ask away.</span>`; renderDocs(j.documents||[]); }
  }catch(e){ note.innerHTML=`<span class="err">${ic('i-error')}${esc(e)}</span>`; }
  btn.disabled=false; document.getElementById('docFiles').value=''; loadSessions();
}
async function ask(){
  const ta=document.getElementById('q'); const q=ta.value.trim(); if(!q||!SID) return;
  const btn=document.getElementById('askBtn'); btn.disabled=true;
  addMsg('user',esc(q)); ta.value=''; ta.style.height='auto';
  const bubble=addMsg('ai',`<span class="spin">${ic('i-loader')}Thinking…</span>`);
  let sources=[], acc="";
  try{
    const resp=await fetch(`/api/sessions/${SID}/ask_stream`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q})});
    const reader=resp.body.getReader(); const dec=new TextDecoder(); let sbuf="";
    while(true){
      const {value,done}=await reader.read(); if(done) break;
      sbuf+=dec.decode(value,{stream:true});
      let i;
      while((i=sbuf.indexOf("\n\n"))>=0){
        const frame=sbuf.slice(0,i); sbuf=sbuf.slice(i+2);
        const ev=(frame.match(/^event: (.*)$/m)||[])[1];
        const dl=(frame.match(/^data: (.*)$/m)||[])[1];
        if(!dl) continue;
        const data=JSON.parse(dl);
        if(ev==='meta') sources=data.sources||[];
        else if(ev==='token'){ acc+=data.t; bubble.textContent=acc; transcript.scrollTop=1e9; }
        else if(ev==='error'){ bubble.innerHTML=`<span class="err">${ic('i-error')}${esc(data.error)}</span>`; }
      }
    }
    if(acc){
      let html=`<div class="rich">${renderRich(acc)}</div>`;
      if(sources.length) html+=`<div class="src">Sources: ${sources.map(s=>`<code>${esc(s)}</code>`).join(' ')}</div>`;
      bubble.innerHTML=html;
    }
    loadSessions();
  }catch(e){ bubble.innerHTML=`<span class="err">${ic('i-error')}${esc(e)}</span>`; }
  document.getElementById('transcript').scrollTop=1e9; btn.disabled=false;
}

// --- digitize ---
async function digitize(){
  const f=document.getElementById('digFile').files[0]; const out=document.getElementById('digOut');
  if(!f){ out.innerHTML=`<span class="err">${ic('i-error')}Choose an image.</span>`; return; }
  const btn=document.getElementById('digBtn'); btn.disabled=true;
  out.innerHTML=`<span class="spin">${ic('i-loader')}Reading the page…</span>`;
  const fd=new FormData(); fd.append('file',f); fd.append('fmt',document.getElementById('digFmt').value);
  try{const j=await (await fetch('/api/digitize',{method:'POST',body:fd})).json();
    out.innerHTML=j.error?`<span class="err">${ic('i-error')}${esc(j.error)}</span>`:`<a class="dl" href="${j.download}">${ic('i-download')}Download</a><div class="rich" style="margin-top:12px">${renderRich(j.markdown)}</div>`;
  }catch(e){ out.innerHTML=`<span class="err">${ic('i-error')}${esc(e)}</span>`; }
  btn.disabled=false;
}

const qta=document.getElementById('q');
qta.addEventListener('input',()=>{qta.style.height='auto';qta.style.height=Math.min(qta.scrollHeight,160)+'px';});
qta.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); ask(); }});
refreshStatus(); loadSessions();
</script>
</body>
</html>
